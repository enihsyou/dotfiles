# dotbot configuration for Windows
# docs: https://github.com/anishathalye/dotbot?tab=readme-ov-file#directives

- defaults:
    link:
      create: true # create parent directories if they don't exist
      relink: true # remove existing symlink before creating new one
    shell:
      stdout: true # show output from stdout
      stderr: true # show error output from stderr
      quiet: true  # display command description rather than statement itself.

- link:
    ~/.gitconfig: git/gitconfig.ini
    ~/.gitignore: git/gitignore.ini
    ~/.gitconfig-delta: git/gitconfig-delta.ini
    ~/.gitconfig-platform: git/gitconfig-windows.ini
    ~/AppData/Roaming/AutoDarkMode/scripts.yaml: gui-app/AutoDarkMode/scripts.yaml

# shell on Windows is Command Prompt (cmd), command is executed with subprocess.call(shell=True)
# thus, command string must stay within the same line, I recommend use ">" for
# no-indentation command, and use no indicators for command with indentation.
- shell:
  - description: Copy gitconfig-local.example.ini to ~/.gitconfig.local
    command:
      IF NOT EXIST "%USERPROFILE%\.gitconfig.local" (
        copy "git\gitconfig-local.example.ini" "%USERPROFILE%\.gitconfig.local"
      )
  - description: Run the initial setup script for Windows
    # powershell is Windows PowerShell 5.x, not pwsh for initinalization reasons
    command: powershell -ExecutionPolicy Bypass -File Windows/initial-setup.ps1
