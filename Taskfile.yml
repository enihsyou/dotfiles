version: "3"

tasks:
  windows_winget_export:
    desc: "Generate Windows/winget-export.json"
    cmds:
      - mkdir -p Windows
      - winget export --source winget --output Windows/winget-export.json

  deploy-wsl2:
    desc: "Deploy files to WSL2"
    cmds:
      - pwsh -c "cp shell/bash/bashrc-wsl2.sh //wsl.localhost/Ubuntu/home/enihsyou/.bashrc"

  prepare-yazi:
    desc: "Download yazi plugins"
    cmds:
      - ya pkg add yazi-rs/plugins:full-border
      - ya pkg add yazi-rs/plugins:toggle-pane
      - ya pack -a TD-Sky/sudo

  windows-shims:
    desc: "Generate shims on Windows"
    cmds:
      - python system/Windows/install_shims.py

  sync-skillshare-metadata:
    desc: "Pull skillshare metadata from hermes.lan.kokomi.site into the repo"
    cmds:
      - mkdir -p cli-app/skillshare/skills
      - scp hermes.pve.kokomi.site:/home/hermes/.config/skillshare/skills/.metadata.json cli-app/skillshare/skills/metadata.json
