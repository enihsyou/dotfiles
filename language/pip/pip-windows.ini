# pip configuration file
# filepath: C:/Users/enihsyou/AppData/Roaming/pip/pip.ini

# Offload pip cache to DevDrive
# https://stackoverflow.com/a/74833710
[global]
cache-dir=G:/AppData/pip/cache

# 要求必须在 venv 下才能使用 pip
# 避免没执行 uv venv --seed
# https://github.com/astral-sh/uv/issues/6593#issuecomment-2311352464
require-virtualenv = true

# https://help.mirrors.cernet.edu.cn/pypi/
index-url = https://mirrors.cernet.edu.cn/pypi/web/simple
