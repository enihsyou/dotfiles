# bun user config
# filepath: ~/.bunfig.toml
#:schema https://json.schemastore.org/bunfig.json

# disable telemetry
telemetry = false

[install]
# set default registry as a string
registry = "https://registry.npmmirror.com"

[install.cache]
# the directory to use for the cache
dir = "G:/AppData/bun/install/cache"
