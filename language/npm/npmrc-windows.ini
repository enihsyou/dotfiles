# npm user config
# filepath: ~/.npmrc
# https://docs.npmjs.com/cli/v11/using-npm/config
# 注意如果以符号链接引用，本文件会被 npm 指令修改

# Quick access for China Mainland
registry=https://registry.npmmirror.com

# Windows Dev Drive
cache=G:\AppData\npm-cache

# 全局安装包的路径
#
# nodejs Windows 安装程序将创建一个 ${NODE_INSTALL}\node_modules\npm\npmrc
# 文件，该文件设置 prefix 指向 `%AppData%\npm`，如 npm 文档中所述
# https://docs.npmjs.com/cli/v11/configuring-npm/folders#prefix-configuration
#
# 当使用 vfox 管理 nodejs 时，情况并非如此，`npm prefix -g` 实际上指向 node 安装
# 的位置。因为 npmrc 文件未包含在 nodejs-release 包中，由安装程序在运行时生成
# 这里还原了 npm 安装程序的行为，但是不在 Roaming 而在 Local 中
prefix=${USERPROFILE}\AppData\Local\npm
